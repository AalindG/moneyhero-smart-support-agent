version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneyhero-backend
    ports:
      - '3001:3001'
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./data:/app/data
      - ./docs:/app/docs
    environment:
      - PORT=3001
      # LLM Provider Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}
      # Claude API (primary)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-haiku-20241022}
      - CLAUDE_ENABLE_CACHING=${CLAUDE_ENABLE_CACHING:-true}
      # Ollama (for embeddings + fallback)
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      # Database
      - DB_PATH=/app/data/moneyhero.db
      - NODE_ENV=production
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: moneyhero-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  ollama_data:
    driver: local
