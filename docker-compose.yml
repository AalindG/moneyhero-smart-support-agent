version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneyhero-backend
    ports:
      - '3001:3001'
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./data:/app/data
      - ./docs:/app/docs
    environment:
      - PORT=3001
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - OLLAMA_CLASSIFIER_MODEL=llama3.2:1b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - DB_PATH=/app/data/moneyhero.db
      - NODE_ENV=production
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moneyhero-frontend
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: moneyhero-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  ollama_data:
    driver: local
